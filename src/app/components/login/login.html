<section class="login " >
    <div class="login-container">
      <div class="login-image-container">
          <div class="image-rectangle">
            <img src="assets/images/marcoaurelio.png" alt="">
            <p class="login-image-text">	“La felicità della tua vita dipende dalla qualità dei tuoi pensieri...
              abbi cura di non coltivare nozioni inadatte alla virtù e di natura ragionevole.” </p>
          </div>
      </div>
      <div class="login-form-container"> 
        <div class="logo-container">
          <img src="/assets/images/logo-blackGold.png" alt="" class="logo">
        </div>
        <div class="formGroup-container">
          <div class="form-title font-medium ">Welcome</div>
          <div class="form  ">
            <!-- START FORM  -->
                   <div class="flex w-full  justify-center mt-10">
                    <form action="#" class=" w-full space-y-6">
                      <!-- FULL NAME INPUT -->
                       <div class="mt-2">
                         <label for="">Full Name</label>
                         <input type="text" name="name" class="block w-full rounded-md h-7  bg-black/5 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500">
                       </div>
                       <!-- EMAIL INPUT -->
                        <div >
                          <label for="email">Email</label>
                         <input type="email" name="email"  required autocomplete="email" class=" block w-full rounded-md h-7  bg-black/5 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500">
                       </div>
                       <!-- PASSWORD INPUT -->
                         <div >
                          <label for="password">Password</label>
                         <input type="password" name="password" required autocomplete="current-password" class="block w-full rounded-md h-7  bg-black/5 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500">
                       </div>
                       <!-- BUTTONS -->
                        <div class="space-y-6 mt-6">
                          <button type="submit" class="w-full justify-center rounded-md  h-7 bg-orange-500 font-semibold text-white hover:bg-orange-400 " >Sign in</button>
                       
                          <p class="text-gray-500 text-center">Oppure</p>
                       
                          <button type="submit" class="w-full rounded-md h-7 bg-orange-500 font-semibold text-white hover:bg-orange-400">Sign up</button>
                        </div>

                    </form>
                   </div>
             <!-- FINISH FORM -->
          </div>
        </div>
   
      </div>
  
    </div>
</section>
