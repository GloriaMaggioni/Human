<section class="milano-page min-h-screen flex flex-col justify-between p-4 md:p-6 border border-solid border-blue-700">
       <div class="carousel  m-auto flex flex-col md:flex-row items-center rounded-lg gap-5 md:gap-5 overflow-hidden p-3 md:p-4 mb-6">
        <img 
            [src]="currentImg.img" 
            alt="{{currentImg.name}}" 
            class="carousel-image w-32 h-40 md:w-38 md:h-43 lg:w-40 lg:h-40 rounded-lg flex-shrink-0  z-50">

        <div class="carousel-text-container text-black w-full md:w-auto z-50">
             <h3 class="carousel-citazione px-4 text-center italic text-lg md:text-2xl lg:text-3xl  items-center">
                {{currentImg.cit}}
            </h3>

            <div class="carousel-textSecondary  flex flex-col mt-6 text-center md:text-left px-4">
                <h4 class="carousel-nameCharacter text-md md:text-base font-medium">
                   {{currentImg.name}} ({{currentImg.bornDate}} - {{currentImg.deathDate}})
                </h4>
                <p class="carousel-professionText text-xs md:text-sm text-gray-600 z-50">
                    {{currentImg.profession}}
                </p>
            </div>
        </div>
    </div>
