        <div class="sidebar-content">
            <div class="logo-container">
                <img [src]="currentLogo" alt="logo" class="logo-img">
            </div>
            <div class="sections-container" *ngFor=" let item of items">
                <ul>
                     <li>
                        <a [routerLink]="item.link" routerLinkActive="active">
                            <img [src]="item.icon" alt="" class="item-icon">
                            <span *ngIf="isOpen()">{{item.label}}</span>
                        </a>
                     
                    </li> 
  
                </ul>

            </div>
            <div class="setting-log-container">
               <div class="setting-container" *ngFor="let item of setting">
                 
                    <a [routerLink]="item.link">
                        <img [src]="item.icon" alt="">
                        <span *ngIf="isOpen()">{{item.label}}</span>

                    </a>
               </div>
                <div class="logout-container" *ngFor="let item of logout">
                 
                    <a [routerLink]="item.link">
                        <img [src]="item.icon" alt="">
                        <span *ngIf="isOpen()">{{item.label}}</span>

                    </a>
               </div>

            </div>
         
        </div>
